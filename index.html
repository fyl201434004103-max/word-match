<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            position: relative;
        }

        .game-container {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 18px 30px;
            max-width: 100%;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border: 1px solid #e0e0e0;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin: 0 0 5px;
            color: #222;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .sub {
            text-align: center;
            background: #e9ecef;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
            padding: 6px 18px;
            border-radius: 30px;
            color: #495057;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px 18px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .level-box, .score-box, .timer-box {
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .level-box, .score-box, .timer-box {
            background: #e9ecef;
            color: #212529;
        }

        .timer-box.warning {
            background: #f8d7da;
            color: #721c24;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .level-selector {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            color: #212529;
            cursor: pointer;
            outline: none;
        }

        .btn-reset {
            background: #6c757d;
            border: none;
            color: white;
            padding: 6px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-reset:active { opacity: 0.8; }

        .message-area {
            background: #f8f9fa;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #212529;
            border: 1px solid #dee2e6;
            font-size: 0.9rem;
        }

        .cards-grid {
            display: grid;
            grid-template-rows: repeat(4, auto);
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 14px 4px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            transition: all 0.15s ease;
            border: 1px solid #dee2e6;
            font-size: 0.8rem;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .card.word-card {
            background: #fff3e0;
            border-color: #ffc107;
            color: #856404;
        }

        .card.def-card {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #0d47a1;
        }

        .card.selected {
            transform: scale(0.97);
            background: #e9ecef;
            border-color: #adb5bd;
        }

        .card.matched {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.85);
            transition: visibility 0.2s, opacity 0.2s, transform 0.2s;
        }

        .card:active:not(.matched) {
            transform: scale(0.97);
        }

            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            background: #e9ecef;
            display: inline-block;

            margin-left: auto;
            margin-right: auto;
            padding: 6px 24px;
            border-radius: 40px;
            color: #212529;

            margin-top: 18px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6c757d;
            background: #f8f9fa;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 4px 16px;
            border-radius: 30px;

        /* 超时弹窗样式 */
        .timeout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .timeout-dialog {
            background: white;
            border-radius: 30px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        .timeout-dialog p {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .timeout-dialog button {
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .timeout-dialog button:active {
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;

            font-weight: 600;

            transition: background 0.2s;

            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 2px;
            outline: none;

            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2196f3;
            cursor: pointer;
        }

            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 100;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);

</head>

    <button class="music-btn" id="playPauseBtn">⏸</button>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="40">
    <button class="music-btn" id="muteBtn">🔊</button>
</div>
<button class="download-btn" id="downloadBtn">⬇️ 下载本游戏</button>

    // ==================== 背景音乐 (轻柔放松) ====================
    // 使用公开可用的轻音乐直链 (Kevin MacLeod 的公共版权音乐)
    const bgmUrl = "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d046da1c6f.mp3";
    
    let audio = null;
    let isPlaying = false;
    let isMuted = false;
    let volume = 40;

    function initAudio() {
        if (audio) return;
        audio = new Audio(bgmUrl);
        audio.loop = true;
        audio.volume = volume / 100;
    }

    function playMusic() {
        if (!audio) initAudio();
        audio.play().then(() => {
            isPlaying = true;
            document.getElementById('playPauseBtn').innerText = '⏸';
        }).catch(e => {
            console.log("自动播放被阻止，需要用户交互");
            isPlaying = false;
            document.getElementById('playPauseBtn').innerText = '▶';
        });
    }

    function pauseMusic() {
        if (audio) {
            audio.pause();
            isPlaying = false;
            document.getElementById('playPauseBtn').innerText = '▶';
        }
    }

    function togglePlay() {
        if (!audio) initAudio();
        if (isPlaying) {
            pauseMusic();
        } else {
            playMusic();
        }
    }

    function setVolume(val) {
        volume = val;
        if (audio) {
            audio.volume = volume / 100;
        }
        document.getElementById('volumeSlider').value = volume;
        if (volume === 0) {
            isMuted = true;
            document.getElementById('muteBtn').innerText = '🔇';
        } else {
            isMuted = false;
            document.getElementById('muteBtn').innerText = '🔊';
        }
    }

    function toggleMute() {
        if (isMuted) {
            setVolume(40);
        } else {
            setVolume(0);
        }
    }

    document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
    document.getElementById('volumeSlider').addEventListener('input', (e) => {
        setVolume(parseInt(e.target.value));
    });
    document.getElementById('muteBtn').addEventListener('click', toggleMute);

    // ==================== 音效系统 (超级玛丽跳跃音效) ====================
    let audioCtx = null;
    let soundAllowed = false;

    function playJumpSound() {
        if (!soundAllowed) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
            osc.start();
            osc.stop(now + 0.25);
        } catch(e) { console.log("jump sound error", e); }
    }

    function enableSound() {
        if (soundAllowed) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.0001;
            const osc = audioCtx.createOscillator();
            osc.connect(gain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.01);
            audioCtx.resume();
            soundAllowed = true;
        } catch(e) { console.log("enableSound error", e); }
    }

    // 倒计时控制
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        stopTimer();
        timeLeft = 40;
        timerSecondsSpan.innerText = timeLeft;
        timerBox.classList.remove('warning');
        
        timerInterval = setInterval(() => {
            if (lock) return; // 动画或配对过程中不减少时间
            if (timeLeft <= 1) {
                // 时间到
                stopTimer();
                if (!isTimeoutShowing && matchedCountCurr < levelsData[currentLevel].words.length) {
                    showTimeoutDialog();
                }
            } else {
                timeLeft--;
                timerSecondsSpan.innerText = timeLeft;
                if (timeLeft <= 5) {
                    timerBox.classList.add('warning');
                } else {
                    timerBox.classList.remove('warning');
                }
            }
        }, 1000);
    }

    // 显示超时弹窗
    function showTimeoutDialog() {
        if (isTimeoutShowing) return;
        isTimeoutShowing = true;
        
        const overlay = document.createElement('div');
        overlay.className = 'timeout-overlay';
        overlay.innerHTML = `
            <div class="timeout-dialog">
                <p>⏰ Keep Going!</p>
                <button id="continueBtn">继续挑战</button>
            </div>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('continueBtn').addEventListener('click', () => {
            overlay.remove();
            isTimeoutShowing = false;
            // 刷新当前关卡（洗牌重置）
            resetCurrentLevel();
        });
    }

    // 洗牌和重置
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildPairsForLevel(levelIdx) {
        const level = levelsData[levelIdx];
        const pairs = [];
        let id = 0;
        for (let i = 0; i < level.words.length; i++) {
            pairs.push({ id: id++, pairIndex: i, type: 'word', text: level.words[i], matched: false });
            pairs.push({ id: id++, pairIndex: i, type: 'def', text: level.defs[i], matched: false });
        }
        return shuffleArray(pairs);
    }

    function resetCurrentLevel() {
        stopTimer();
        selectedCardId = null;
        matchedCountCurr = 0;
        currentPairs = buildPairsForLevel(currentLevel);
        lock = false;
        renderGame();
        startTimer();
        showMessage(`🃏 卡片已重新洗牌！继续挑战第 ${currentLevel+1} 关`, false);
    }

    function showMessage(msg, isError) {
        const msgBox = document.getElementById('messageBox');
        msgBox.innerHTML = msg;
        msgBox.style.background = isError ? '#f8d7da' : '#d4edda';
        msgBox.style.color = isError ? '#721c24' : '#155724';
        setTimeout(() => {
            if (document.getElementById('messageBox').innerHTML === msg) {
                document.getElementById('messageBox').innerHTML = '💡 点击单词卡，再点击释义卡配对 | 40秒内完成挑战！';
                document.getElementById('messageBox').style.background = '#f8f9fa';
                document.getElementById('messageBox').style.color = '#212529';
            }
        }, 1500);
    }

    function renderGame() {
        const totalPairs = levelsData[currentLevel].words.length;
        document.getElementById('totalPairs').innerText = totalPairs;
        document.getElementById('matchedCount').innerText = matchedCountCurr;
        document.getElementById('levelNum').innerText = currentLevel + 1;
        document.getElementById('totalLevels').innerText = levelsData.length;

        if (levelSelect.value != currentLevel) {
            levelSelect.value = currentLevel;
        }

        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        for (let card of currentPairs) {
            const cardDiv = document.createElement('div');
            cardDiv.className = `card ${card.type === 'word' ? 'word-card' : 'def-card'}`;
            if (card.matched) cardDiv.classList.add('matched');
            if (selectedCardId === card.id && !card.matched) cardDiv.classList.add('selected');
            cardDiv.innerText = card.text;
            cardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lock) return;
                if (card.matched) {
                    showMessage('🎈 这个词已经配对过啦！', false);
                    return;
                }
                handleCardClick(card.id);
            });
            grid.appendChild(cardDiv);
        }

        if (matchedCountCurr === totalPairs && currentLevel + 1 === levelsData.length) {
            document.getElementById('nextInfo').innerHTML = '🏆 恭喜通关！ 🏆';
            stopTimer();
        } else if (matchedCountCurr === totalPairs) {
            document.getElementById('nextInfo').innerHTML = '🎉 完成！进入下一关... 🎉';
            stopTimer();
            setTimeout(() => {
                if (currentLevel + 1 < levelsData.length) {
                    goToLevel(currentLevel + 1);
                }
            }, 1000);
        } else {
            document.getElementById('nextInfo').innerHTML = '';
        }
    }

    function handleCardClick(clickedId) {
        const clickedCard = currentPairs.find(c => c.id === clickedId);
        if (!clickedCard || clickedCard.matched) return;

        if (selectedCardId === null) {
            selectedCardId = clickedCard.id;
            renderGame();
            return;
        }

        const selectedCard = currentPairs.find(c => c.id === selectedCardId);
        if (!selectedCard || selectedCard.matched) {
            selectedCardId = null;
            handleCardClick(clickedId);
            return;
        }

        if (selectedCard.id === clickedCard.id) {
            selectedCardId = null;
            renderGame();
            return;
        }

        const isMatch = (selectedCard.pairIndex === clickedCard.pairIndex && selectedCard.type !== clickedCard.type);
        if (isMatch) {
            lock = true;
            selectedCard.matched = true;
            clickedCard.matched = true;
            matchedCountCurr++;
            playJumpSound();  // 马里奥跳跃音效
            selectedCardId = null;
            renderGame();
            lock = false;
        } else {
            selectedCardId = null;
            showMessage(`❌ 配对错误： "${selectedCard.text}" 和 "${clickedCard.text}" 不对应，重新洗牌！`, true);
            resetCurrentLevel();
        }
    }

    function goToLevel(levelIndex) {
        if (levelIndex < 0 || levelIndex >= levelsData.length) return;
        stopTimer();
        currentLevel = levelIndex;
        selectedCardId = null;
        matchedCountCurr = 0;
        currentPairs = buildPairsForLevel(currentLevel);
        lock = false;
        renderGame();
        startTimer();
        showMessage(`✨ 已跳转到第 ${currentLevel+1} 关 ✨`, false);
    }

    function resetFullGame() {
        goToLevel(0);
    }

    function initLevelSelect() {
        levelSelect.innerHTML = '';
        for (let i = 0; i < levelsData.length; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第 ${i+1} 关 (${levelsData[i].words.length}词)`;
            levelSelect.appendChild(option);
        }
        levelSelect.value = 0;
        levelSelect.addEventListener('change', (e) => {
            const newLevel = parseInt(e.target.value);
            if (!isNaN(newLevel) && newLevel !== currentLevel) {
                goToLevel(newLevel);
            }
        });
    }

    function downloadGame() {
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'word_match_game.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showMessage('📥 游戏文件已开始下载！', false);
    }

    resetBtn.addEventListener('click', resetFullGame);
    downloadBtn.addEventListener('click', downloadGame);

    // 首次点击页面任意位置启用音乐和音效
    document.body.addEventListener('click', () => {
        enableSound();
        if (!audio) {
            initAudio();
            playMusic();
        } else if (!isPlaying) {
            playMusic();
        }
    }, { once: true });

    initLevelSelect();
    goToLevel(0);
</script>
</body>

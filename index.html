<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词消消乐 · 自由选关版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .game-container {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 18px 30px;
            max-width: 100%;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border: 1px solid #e0e0e0;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 5px;
            color: #222;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .sub {
            text-align: center;
            background: #e9ecef;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
            padding: 6px 18px;
            border-radius: 30px;
            color: #495057;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px 18px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .level-box, .score-box {
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .level-box {
            background: #e9ecef;
            color: #212529;
        }

        .score-box {
            background: #e9ecef;
            color: #212529;
        }

        /* 关卡选择下拉框 */
        .level-selector {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            color: #212529;
            cursor: pointer;
            outline: none;
        }

        .btn-reset {
            background: #6c757d;
            border: none;
            color: white;
            padding: 6px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-reset:active { opacity: 0.8; }

        .message-area {
            background: #f8f9fa;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #212529;
            border: 1px solid #dee2e6;
            font-size: 1rem;
        }

        /* 四行六列网格 */
        .cards-grid {
            display: grid;
            grid-template-rows: repeat(4, auto);
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 14px 4px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            transition: all 0.15s ease;
            border: 1px solid #dee2e6;
            font-size: 0.9rem;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .card.word-card {
            background: #fff3e0;
            border-color: #ffc107;
            color: #856404;
        }

        .card.def-card {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #0d47a1;
        }

        .card.selected {
            transform: scale(0.97);
            background: #e9ecef;
            border-color: #adb5bd;
        }

        .card.matched {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.85);
            transition: visibility 0.2s, opacity 0.2s, transform 0.2s;
        }

        .card:active:not(.matched) {
            transform: scale(0.97);
        }

        .next-info {
            text-align: center;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
            background: #e9ecef;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 24px;
            border-radius: 40px;
            color: #212529;
        }

        footer {
            text-align: center;
            margin-top: 18px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #6c757d;
            background: #f8f9fa;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 4px 16px;
            border-radius: 30px;
        }

        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 100;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .download-btn:active {
            opacity: 0.8;
        }

        /* 手机小屏幕适配 */
        @media (max-width: 600px) {
            .cards-grid {
                gap: 8px;
            }
            .card {
                padding: 10px 2px;
                font-size: 0.75rem;
                min-height: 65px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .level-box, .score-box {
                font-size: 0.85rem;
                padding: 4px 14px;
            }
            .btn-reset {
                padding: 5px 16px;
                font-size: 0.8rem;
            }
            .message-area {
                font-size: 0.85rem;
            }
            .level-selector {
                font-size: 0.75rem;
                padding: 4px 8px;
            }
        }

        /* 横屏适配 */
        @media (orientation: landscape) and (max-height: 500px) {
            .cards-grid {
                gap: 6px;
            }
            .card {
                padding: 6px 2px;
                font-size: 0.7rem;
                min-height: 50px;
            }
            .game-container {
                padding: 12px 12px 20px;
            }
            .info-bar {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📖 单词消消乐</h1>
    <div style="text-align: center;"><span class="sub">UNIT 7 · UNIT 8 · UNIT 9</span></div>

    <div class="info-bar">
        <span class="level-box">第 <span id="levelNum">1</span> / <span id="totalLevels"></span> 关</span>
        <span class="score-box">✅ <span id="matchedCount">0</span> / <span id="totalPairs"></span></span>
        <select id="levelSelect" class="level-selector"></select>
        <button class="btn-reset" id="resetGameBtn">🔄 重玩</button>
    </div>
    <div class="message-area" id="messageBox">
        💡 点击单词卡，再点击释义卡配对
    </div>

    <div id="cardsGrid" class="cards-grid"></div>
    <div id="nextInfo" class="next-info"></div>
    <footer>🎯 全部配对自动下一关 | 配对错误会重新洗牌 | 可自由选择关卡</footer>
</div>
<button class="download-btn" id="downloadBtn">⬇️ 下载本游戏</button>

<script>
    // ==================== 关卡数据 (共17关，每关12对单词) ====================
    const levelsData = [
        { words: ["OPERA","BAND","PERFORMANCE","EXHIBITION","CLASSICAL","JAZZ","DRAMA","COMEDY","CALLIGRAPHY","PERFORMER","TALENTED","COMPONENT"],
          defs: ["歌剧","乐队","表演","展览","古典的","爵士乐","戏剧","喜剧","书法","表演者","有才能的","组成部分"] },
        { words: ["COSTUME","SHADE","ATMOSPHERE","MONTHLY","UPLIFTING","MASTERPIECE","FIGURE","STARRY","MENTALLY","MASSIVE","BENEATH","AFFECT"],
          defs: ["戏装","阴影部分","气氛","每月地","令人振奋的","杰作","人像","布满星星的","精神上","巨大的","在下方","影响"] },
        { words: ["SPOT","FAILURE","SCREAM","STRIKING","VIEWER","BURNING","CAUSE","EMPIRE","SCENE","MYSTERIOUS","VISUAL","REACTION"],
          defs: ["斑点","失败","尖叫","惊人的","观看者","燃烧着的","导致","帝国","景色","神秘的","视觉的","反应"] },
        { words: ["MALE","MASK","CLOWN","EMOTION","ACROBATICS","MASTER","REFER","PERFORM","PATTERN","OTHERWISE","CARRIAGE","COMPLEX"],
          defs: ["男性的","面具","小丑","情感","杂技","精通","提到","表演","图案","否则","马车","复杂的"] },
        { words: ["ASPECT","ORCHESTRA","GENIUS","SYMPHONY","MINOR","COMPOSER","PIANO","STRUGGLE","PROCEED","NOTE","SCORE","RESPOND"],
          defs: ["方面","管弦乐队","天才","交响乐","小调的","作曲家","钢琴","奋斗","继续进行","音符","乐谱","回应"] },
        { words: ["BACKSTAGE","TENSE","CONDUCTOR","HESITATE","CHARGE","JOYOUS","SIGNAL","BROAD","COMPOSE","ADVERTISEMENT","YOUTH","CONTEST"],
          defs: ["后台的","紧张的","指挥","犹豫","负责","欢乐的","标志着","宽阔的","作曲","广告","青少年","比赛"] },
        { words: ["MARTIAL ARTS","MADAM","DOCUMENTARY","CURRENTLY","ACCEPTABLE","INDIVIDUAL","APPRECIATE","FAITHFULLY","EXPRESSIVE","ARTISTIC","EXTENSIVELY","SYMBOLISM"],
          defs: ["武术","女士","纪录片","当前","可接受的","个人","感激","忠诚地","富于感情的","艺术的","广泛地","象征主义"] },
        { words: ["SCULPTOR","ADMIRATION","TAP","TISSUE","OCEAN","SMOG","DESERT","GLOBAL","INDUSTRIAL","EXTINCTION","SOLUTION","ELECTRICITY"],
          defs: ["雕刻家","敬佩","龙头","纸巾","海洋","雾霾","沙漠","全球的","工业的","灭绝","解决办法","电"] },
        { words: ["TRANSPORT","RECYCLE","BATTERY","CARBON","BALANCE","FLAT","ROOT","SHOOT","BOTHER","INSTITUTE","CHIMPANZEE","FIRM"],
          defs: ["交通运输","回收利用","电池","碳","平衡","公寓","树根","嫩枝","费心","机构","黑猩猩","稳固的"] },
        { words: ["FOUNDATION","BRICK","INVOLVE","POSTER","FOUNDER","PROFIT","PM","ORGANISER","UNION","CONTENTED","OCCUR","AGRICULTURE"],
          defs: ["基础","砖","参与","海报","创办人","盈利","下午","组织者","联合会","满意的","发生","农业"] },
        { words: ["PROPOSAL","REGION","SLIM","SURVIVAL","RATE","QUOTE","HEADSTONE","OVERCOME","DETERMINATION","FORMER","CURRENT","COUNTY"],
          defs: ["建议","地区","微小的","幸存","比率","引文","墓碑","克服","决心","以前的","当前的","县"] },
        { words: ["ORDINARY","PARKING","THEREFORE","PATH","DISAPPEAR","TRACKING","DESTINATION","RESIDENT","OFFICIAL","ATTITUDE","DIAGRAM","PERCENTAGE"],
          defs: ["普通的","停放","因此","小径","消失","跟踪","目的地","居民","官员","看法","图解","百分比"] },
        { words: ["TAKE PART IN","CUT BACK ON","PACKAGING","PLASTIC","HONEY","BUTTER","YOGHURT","CONTAINER","MAJORITY","AIR CONDITIONING","SUM","TO SUM UP"],
          defs: ["参加","削减","包装材料","塑料制的","蜂蜜","黄油","酸奶","容器","大多数","空调系统","概括","总之"] },
        { words: ["INDICATE","LANDFILL","FOOTWEAR","APPROACH","GEOMETRY","PARTNER","BRUSH UP ON","REFLECT","REFLECT ON","ARGUE","ARGUE WITH","ASSUME"],
          defs: ["表明","废弃物填埋场","鞋类","方法","几何学","搭档","温习","仔细思考","思考","争吵","争吵","认为"] },
        { words: ["AUTOMATIC","INNER","OUTER","FLEXIBLE","PROMOTE","WORK OUT","IN SHORT","ATTEMPT TO","AT THE HEART OF","UNLIKELY","BE BASED ON","DINOSAUR"],
          defs: ["自动的","内部的","外部的","灵活的","促进","弄懂","总而言之","尝试","在中心","不大可能的","以根据","恐龙"] },
        { words: ["EXIST","IGNORE","IMPRESSION","SIMPLIFIED","CLASSIC","UNFAMILIAR","MEMORISE","STRATEGY","EFFECTIVELY","BEYOND","ANNUALLY","NEAR-SURFACE"],
          defs: ["存在","忽视","印象","简化了的","经典的","不熟悉的","记住","策略","有效地","超出范围","每年","近地表的"] },
        { words: ["BUILD-UP","POLLUTANT","FLOODING","OVERFLOW","WORK THROUGH","END UP DOING"],
          defs: ["增长","污染物","洪水泛滥","满是","调整情绪","最后"] }
    ];

    // ==================== 游戏状态 ====================
    let currentLevel = 0;          // 0索引
    let currentPairs = [];
    let selectedCardId = null;
    let matchedCountCurr = 0;
    let lock = false;

    // DOM 元素
    const levelSelect = document.getElementById('levelSelect');
    const resetBtn = document.getElementById('resetGameBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    // 辅助函数
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildPairsForLevel(levelIdx) {
        const level = levelsData[levelIdx];
        const pairs = [];
        let id = 0;
        for (let i = 0; i < level.words.length; i++) {
            pairs.push({ id: id++, pairIndex: i, type: 'word', text: level.words[i], matched: false });
            pairs.push({ id: id++, pairIndex: i, type: 'def', text: level.defs[i], matched: false });
        }
        return shuffleArray(pairs);
    }

    function resetCurrentLevel() {
        selectedCardId = null;
        matchedCountCurr = 0;
        currentPairs = buildPairsForLevel(currentLevel);
        lock = false;
        renderGame();
        showMessage(`🃏 已切换到第 ${currentLevel+1} 关，卡片已洗牌`, false);
    }

    function showMessage(msg, isError) {
        const msgBox = document.getElementById('messageBox');
        msgBox.innerHTML = msg;
        msgBox.style.background = isError ? '#f8d7da' : '#d4edda';
        msgBox.style.color = isError ? '#721c24' : '#155724';
        setTimeout(() => {
            if (document.getElementById('messageBox').innerHTML === msg) {
                document.getElementById('messageBox').innerHTML = '💡 点击单词卡，再点击释义卡配对';
                document.getElementById('messageBox').style.background = '#f8f9fa';
                document.getElementById('messageBox').style.color = '#212529';
            }
        }, 1500);
    }

    function renderGame() {
        const totalPairs = levelsData[currentLevel].words.length;
        document.getElementById('totalPairs').innerText = totalPairs;
        document.getElementById('matchedCount').innerText = matchedCountCurr;
        document.getElementById('levelNum').innerText = currentLevel + 1;
        document.getElementById('totalLevels').innerText = levelsData.length;

        // 同步下拉框的选中值
        if (levelSelect.value != currentLevel) {
            levelSelect.value = currentLevel;
        }

        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        for (let card of currentPairs) {
            const cardDiv = document.createElement('div');
            cardDiv.className = `card ${card.type === 'word' ? 'word-card' : 'def-card'}`;
            if (card.matched) cardDiv.classList.add('matched');
            if (selectedCardId === card.id && !card.matched) cardDiv.classList.add('selected');
            cardDiv.innerText = card.text;
            cardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lock) return;
                if (card.matched) {
                    showMessage('🎈 这个词已经配对过啦！', false);
                    return;
                }
                handleCardClick(card.id);
            });
            grid.appendChild(cardDiv);
        }

        if (matchedCountCurr === totalPairs && currentLevel + 1 === levelsData.length) {
            document.getElementById('nextInfo').innerHTML = '🏆 恭喜通关！ 🏆';
        } else if (matchedCountCurr === totalPairs) {
            document.getElementById('nextInfo').innerHTML = '🎉 完成！进入下一关... 🎉';
            setTimeout(() => {
                if (currentLevel + 1 < levelsData.length) {
                    goToLevel(currentLevel + 1);
                }
            }, 1000);
        } else {
            document.getElementById('nextInfo').innerHTML = '';
        }
    }

    function handleCardClick(clickedId) {
        const clickedCard = currentPairs.find(c => c.id === clickedId);
        if (!clickedCard || clickedCard.matched) return;

        if (selectedCardId === null) {
            selectedCardId = clickedCard.id;
            renderGame();
            return;
        }

        const selectedCard = currentPairs.find(c => c.id === selectedCardId);
        if (!selectedCard || selectedCard.matched) {
            selectedCardId = null;
            handleCardClick(clickedId);
            return;
        }

        if (selectedCard.id === clickedCard.id) {
            selectedCardId = null;
            renderGame();
            return;
        }

        const isMatch = (selectedCard.pairIndex === clickedCard.pairIndex && selectedCard.type !== clickedCard.type);
        if (isMatch) {
            lock = true;
            selectedCard.matched = true;
            clickedCard.matched = true;
            matchedCountCurr++;
            selectedCardId = null;
            renderGame();
            if (matchedCountCurr === levelsData[currentLevel].words.length) {
                // 自动进入下一关的逻辑已在 renderGame 中处理
            }
            lock = false;
        } else {
            selectedCardId = null;
            showMessage(`❌ 配对错误： "${selectedCard.text}" 和 "${clickedCard.text}" 不对应，重新洗牌！`, true);
            resetCurrentLevel();  // 洗牌重置当前关卡
        }
    }

    // 跳转到指定关卡 (0索引)
    function goToLevel(levelIndex) {
        if (levelIndex < 0 || levelIndex >= levelsData.length) return;
        currentLevel = levelIndex;
        selectedCardId = null;
        matchedCountCurr = 0;
        currentPairs = buildPairsForLevel(currentLevel);
        lock = false;
        renderGame();
        showMessage(`✨ 已跳转到第 ${currentLevel+1} 关 ✨`, false);
    }

    function resetFullGame() {
        goToLevel(0);
    }

    // 初始化关卡选择下拉框
    function initLevelSelect() {
        levelSelect.innerHTML = '';
        for (let i = 0; i < levelsData.length; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第 ${i+1} 关 (${levelsData[i].words.length}词)`;
            levelSelect.appendChild(option);
        }
        levelSelect.value = 0;
        levelSelect.addEventListener('change', (e) => {
            const newLevel = parseInt(e.target.value);
            if (!isNaN(newLevel) && newLevel !== currentLevel) {
                goToLevel(newLevel);
            }
        });
    }

    // 下载游戏文件
    function downloadGame() {
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'word_match_game.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showMessage('📥 游戏文件已开始下载！', false);
    }

    // 事件绑定
    resetBtn.addEventListener('click', resetFullGame);
    downloadBtn.addEventListener('click', downloadGame);

    // 初始化
    initLevelSelect();
    goToLevel(0);
</script>
</body>
</html>

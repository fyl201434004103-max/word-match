<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词消消乐 · 灵魂词汇挑战</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            position: relative;
        }

        .game-container {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 18px 30px;
            max-width: 100%;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border: 1px solid #e0e0e0;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 5px;
            color: #222;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .sub {
            text-align: center;
            background: #e9ecef;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
            padding: 6px 18px;
            border-radius: 30px;
            color: #495057;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px 18px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .level-box, .score-box, .timer-box {
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .level-box, .score-box, .timer-box {
            background: #e9ecef;
            color: #212529;
        }

        .timer-box.warning {
            background: #f8d7da;
            color: #721c24;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .level-selector {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            color: #212529;
            cursor: pointer;
            outline: none;
        }

        .btn-reset {
            background: #6c757d;
            border: none;
            color: white;
            padding: 6px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-reset:active { opacity: 0.8; }

        .message-area {
            background: #f8f9fa;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #212529;
            border: 1px solid #dee2e6;
            font-size: 0.95rem;
        }

        .cards-grid {
            display: grid;
            grid-template-rows: repeat(6, auto);
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 12px 3px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            transition: all 0.15s ease;
            border: 1px solid #dee2e6;
            font-size: 0.8rem;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
            text-transform: lowercase;
        }

        .card.word-card {
            background: #fff3e0;
            border-color: #ffc107;
            color: #856404;
        }

        .card.def-card {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #0d47a1;
        }

        .card.selected {
            transform: scale(0.97);
            background: #e9ecef;
            border-color: #adb5bd;
        }

        .card.matched {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.85);
            transition: visibility 0.2s, opacity 0.2s, transform 0.2s;
        }

        .card:active:not(.matched) {
            transform: scale(0.97);
        }

        .next-info {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            background: #e9ecef;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 24px;
            border-radius: 40px;
            color: #212529;
        }

        footer {
            text-align: center;
            margin-top: 18px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6c757d;
            background: #f8f9fa;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 4px 16px;
            border-radius: 30px;
        }

        .timeout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .timeout-dialog {
            background: white;
            border-radius: 30px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        .timeout-dialog p {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .timeout-dialog button {
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .timeout-dialog button:active {
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            border: 1px solid #e0e0e0;
            z-index: 100;
        }

        .music-info {
            font-size: 0.75rem;
            font-weight: 600;
            color: #333;
        }

        .music-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: background 0.2s;
            color: #555;
        }
        .music-btn:active {
            background: rgba(0, 0, 0, 0.1);
        }

        .volume-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2196f3;
            cursor: pointer;
        }

        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 100;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .download-btn:active {
            opacity: 0.8;
        }

        @media (max-width: 800px) {
            .cards-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .card {
                padding: 10px 2px;
                font-size: 0.7rem;
                min-height: 60px;
            }
        }

        @media (max-width: 500px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            .level-box, .score-box, .timer-box {
                font-size: 0.8rem;
                padding: 4px 12px;
            }
            .btn-reset {
                padding: 5px 16px;
                font-size: 0.8rem;
            }
            .message-area {
                font-size: 0.8rem;
            }
            .level-selector {
                font-size: 0.75rem;
                padding: 4px 8px;
            }
            .music-player {
                bottom: 10px;
                left: 10px;
                padding: 4px 10px;
            }
            .download-btn {
                bottom: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            .timeout-dialog {
                padding: 20px 30px;
            }
            .timeout-dialog p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📖 单词消消乐 · 灵魂词汇</h1>
    <div style="text-align: center;"><span class="sub">每关12对单词 · 灵魂觉醒挑战</span></div>

    <div class="info-bar">
        <span class="level-box">第 <span id="levelNum">1</span> / <span id="totalLevels"></span> 关</span>
        <span class="score-box">✅ <span id="matchedCount">0</span> / <span id="totalPairs"></span></span>
        <span class="timer-box" id="timerBox">⏱️ <span id="timerSeconds">50</span> 秒</span>
        <select id="levelSelect" class="level-selector"></select>
        <button class="btn-reset" id="resetGameBtn">🔄 重玩本关</button>
    </div>
    <div class="message-area" id="messageBox">
        💡 点击单词卡，再点击释义卡配对 | 50秒内完成挑战！
    </div>

    <div id="cardsGrid" class="cards-grid"></div>
    <div id="nextInfo" class="next-info"></div>
    <footer>🎯 全部配对自动下一关 | 超时弹出继续窗口 | 配对错误会重新洗牌</footer>
</div>

<div class="music-player" id="musicPlayer">
    <div class="music-info">🎵 轻柔学习音乐</div>
    <button class="music-btn" id="playPauseBtn">⏸</button>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="40">
    <button class="music-btn" id="muteBtn">🔊</button>
</div>
<button class="download-btn" id="downloadBtn">⬇️ 下载本游戏</button>

<script>
    // ==================== 背景音乐 ====================
    const bgmUrl = "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d046da1c6f.mp3";
    
    let audio = null;
    let isPlaying = false;
    let isMuted = false;
    let volume = 40;

    function initAudio() {
        if (audio) return;
        audio = new Audio(bgmUrl);
        audio.loop = true;
        audio.volume = volume / 100;
    }

    function playMusic() {
        if (!audio) initAudio();
        audio.play().then(() => {
            isPlaying = true;
            document.getElementById('playPauseBtn').innerText = '⏸';
        }).catch(e => {
            isPlaying = false;
            document.getElementById('playPauseBtn').innerText = '▶';
        });
    }

    function pauseMusic() {
        if (audio) {
            audio.pause();
            isPlaying = false;
            document.getElementById('playPauseBtn').innerText = '▶';
        }
    }

    function togglePlay() {
        if (!audio) initAudio();
        if (isPlaying) pauseMusic();
        else playMusic();
    }

    function setVolume(val) {
        volume = val;
        if (audio) audio.volume = volume / 100;
        document.getElementById('volumeSlider').value = volume;
        document.getElementById('muteBtn').innerText = volume === 0 ? '🔇' : '🔊';
    }

    function toggleMute() {
        setVolume(volume === 0 ? 40 : 0);
    }

    document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
    document.getElementById('volumeSlider').addEventListener('input', (e) => setVolume(parseInt(e.target.value)));
    document.getElementById('muteBtn').addEventListener('click', toggleMute);

    // ==================== 马里奥跳跃音效 ====================
    let audioCtx = null;
    let soundAllowed = false;

    function playJumpSound() {
        if (!soundAllowed) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
            osc.start();
            osc.stop(now + 0.25);
        } catch(e) {}
    }

    function enableSound() {
        if (soundAllowed) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.0001;
            const osc = audioCtx.createOscillator();
            osc.connect(gain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.01);
            audioCtx.resume();
            soundAllowed = true;
        } catch(e) {}
    }

    // ==================== 单词词库 (共60对，每关12对，共5关) ====================
    const FULL_PAIRS = [
        { en: "efforts", zh: "努力" },
        { en: "achievements", zh: "成就" },
        { en: "expectations", zh: "期望" },
        { en: "struggles", zh: "挣扎 / 奋斗" },
        { en: "floated", zh: "漂浮" },
        { en: "crashed", zh: "坠毁 / 碰撞" },
        { en: "resisted", zh: "抵抗" },
        { en: "separated", zh: "分离" },
        { en: "dream", zh: "梦想" },
        { en: "honor", zh: "荣誉" },
        { en: "mess", zh: "混乱" },
        { en: "labor", zh: "劳动" },
        { en: "won", zh: "赢得" },
        { en: "watched", zh: "观看" },
        { en: "organized", zh: "组织" },
        { en: "led", zh: "领导 / 带领" },
        { en: "show", zh: "展示 / 节目" },
        { en: "lesson", zh: "课 / 教训" },
        { en: "course", zh: "课程 / 过程" },
        { en: "report", zh: "报告" },
        { en: "soul-awakening", zh: "灵魂觉醒的" },
        { en: "heart-breaking", zh: "心碎的" },
        { en: "mind-blowing", zh: "令人震惊的" },
        { en: "eye-opening", zh: "令人大开眼界的" },
        { en: "network", zh: "网络" },
        { en: "competition", zh: "竞争" },
        { en: "team", zh: "团队" },
        { en: "foundation", zh: "基础 / 基金会" },
        { en: "thus", zh: "因此" },
        { en: "still", zh: "仍然" },
        { en: "rather", zh: "相反 / 宁可" },
        { en: "moreover", zh: "此外" },
        { en: "vision", zh: "视力 / 视野" },
        { en: "hearing", zh: "听力" },
        { en: "touch", zh: "触觉" },
        { en: "balance", zh: "平衡" },
        { en: "buy", zh: "买" },
        { en: "chew", zh: "咀嚼" },
        { en: "digest", zh: "消化" },
        { en: "cook", zh: "烹饪" },
        { en: "removed", zh: "移除" },
        { en: "spotted", zh: "发现" },
        { en: "needed", zh: "需要" },
        { en: "trapped", zh: "被困住" },
        { en: "change", zh: "改变" },
        { en: "problem", zh: "问题" },
        { en: "call", zh: "打电话 / 呼唤" },
        { en: "picture", zh: "图片 / 画面" },
        { en: "grateful", zh: "感激的" },
        { en: "calm", zh: "冷静的" },
        { en: "positive", zh: "积极的" },
        { en: "loyal", zh: "忠诚的" },
        { en: "patience", zh: "耐心" },
        { en: "relief", zh: "解脱 / 缓解" },
        { en: "creativity", zh: "创造力" },
        { en: "inspiration", zh: "灵感" },
        { en: "mixed up", zh: "混淆 / 搞混" },
        { en: "fed up", zh: "厌倦" },
        { en: "knocked down", zh: "击倒 / 拆除" },
        { en: "torn down", zh: "拆毁 / 拆除" }
    ];

    // 构建关卡数据：每关12对（24个单词），共5关（60对）
    const PAIRS_PER_LEVEL = 12;
    const levelsData = [];
    for (let i = 0; i < FULL_PAIRS.length; i += PAIRS_PER_LEVEL) {
        const chunk = FULL_PAIRS.slice(i, i + PAIRS_PER_LEVEL);
        if (chunk.length > 0) {
            levelsData.push({
                words: chunk.map(p => p.en),
                defs: chunk.map(p => p.zh)
            });
        }
    }

    // ==================== 游戏状态 ====================
    let currentLevel = 0;
    let currentPairs = [];
    let selectedCardId = null;
    let matchedCountCurr = 0;
    let lock = false;
    let timerInterval = null;
    let timeLeft = 50;  // 每关50秒
    let isTimeoutShowing = false;

    const levelSelect = document.getElementById('levelSelect');
    const resetBtn = document.getElementById('resetGameBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const timerSecondsSpan = document.getElementById('timerSeconds');
    const timerBox = document.getElementById('timerBox');

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function startTimer() {
        stopTimer();
        timeLeft = 50;
        timerSecondsSpan.innerText = timeLeft;
        timerBox.classList.remove('warning');
        timerInterval = setInterval(() => {
            if (lock) return;
            if (timeLeft <= 1) {
                stopTimer();
                if (!isTimeoutShowing && matchedCountCurr < levelsData[currentLevel].words.length) {
                    showTimeoutDialog();
                }
            } else {
                timeLeft--;
                timerSecondsSpan.innerText = timeLeft;
                if (timeLeft <= 5) timerBox.classList.add('warning');
                else timerBox.classList.remove('warning');
            }
        }, 1000);
    }

    function showTimeoutDialog() {
        if (isTimeoutShowing) return;
        isTimeoutShowing = true;
        const overlay = document.createElement('div');
        overlay.className = 'timeout-overlay';
        overlay.innerHTML = `<div class="timeout-dialog"><p>⏰ Keep Going!</p><button id="continueBtn">继续挑战</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('continueBtn').addEventListener('click', () => {
            overlay.remove();
            isTimeoutShowing = false;
            resetCurrentLevel();
        });
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildPairsForLevel(levelIdx) {
        const level = levelsData[levelIdx];
        const pairs = [];
        let id = 0;
        for (let i = 0; i < level.words.length; i++) {
            pairs.push({ id: id++, pairIndex: i, type: 'word', text: level.words[i], matched: false });
            pairs.push({ id: id++, pairIndex: i, type: 'def', text: level.defs[i], matched: false });
        }
        return shuffleArray(pairs);
    }

    function resetCurrentLevel() {
        stopTimer();
        selectedCardId = null;
        matchedCountCurr = 0;
        currentPairs = buildPairsForLevel(currentLevel);
        lock = false;
        renderGame();
        startTimer();
        showMessage(`🃏 卡片已重新洗牌！继续挑战第 ${currentLevel+1} 关`, false);
    }

    function showMessage(msg, isError) {
        const msgBox = document.getElementById('messageBox');
        msgBox.innerHTML = msg;
        msgBox.style.background = isError ? '#f8d7da' : '#d4edda';
        msgBox.style.color = isError ? '#721c24' : '#155724';
        setTimeout(() => {
            if (document.getElementById('messageBox').innerHTML === msg) {
                document.getElementById('messageBox').innerHTML = '💡 点击单词卡，再点击释义卡配对 | 50秒内完成挑战！';
                document.getElementById('messageBox').style.background = '#f8f9fa';
                document.getElementById('messageBox').style.color = '#212529';
            }
        }, 1500);
    }

    function renderGame() {
        const totalPairs = levelsData[currentLevel].words.length;
        document.getElementById('totalPairs').innerText = totalPairs;
        document.getElementById('matchedCount').innerText = matchedCountCurr;
        document.getElementById('levelNum').innerText = currentLevel + 1;
        document.getElementById('totalLevels').innerText = levelsData.length;
        if (levelSelect.value != currentLevel) levelSelect.value = currentLevel;

        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        for (let card of currentPairs) {
            const cardDiv = document.createElement('div');
            cardDiv.className = `card ${card.type === 'word' ? 'word-card' : 'def-card'}`;
            if (card.matched) cardDiv.classList.add('matched');
            if (selectedCardId === card.id && !card.matched) cardDiv.classList.add('selected');
            cardDiv.innerText = card.text;
            cardDiv.addEventListener('click', () => {
                if (lock || card.matched) return;
                handleCardClick(card.id);
            });
            grid.appendChild(cardDiv);
        }

        if (matchedCountCurr === totalPairs && currentLevel + 1 === levelsData.length) {
            document.getElementById('nextInfo').innerHTML = '🏆 恭喜通关！ 🏆';
            stopTimer();
        } else if (matchedCountCurr === totalPairs) {
            document.getElementById('nextInfo').innerHTML = '🎉 完成！进入下一关... 🎉';
            stopTimer();
            setTimeout(() => { if (currentLevel + 1 < levelsData.length) goToLevel(currentLevel + 1); }, 1000);
        } else {
            document.getElementById('nextInfo').innerHTML = '';
        }
    }

    function handleCardClick(clickedId) {
        const clickedCard = currentPairs.find(c => c.id === clickedId);
        if (!clickedCard || clickedCard.matched) return;
        if (selectedCardId === null) {
            selectedCardId = clickedCard.id;
            renderGame();
            return;
        }
        const selectedCard = currentPairs.find(c => c.id === selectedCardId);
        if (!selectedCard || selectedCard.matched) {
            selectedCardId = null;
            handleCardClick(clickedId);
            return;
        }
        if (selectedCard.id === clickedCard.id) {
            selectedCardId = null;
            renderGame();
            return;
        }
        const isMatch = (selectedCard.pairIndex === clickedCard.pairIndex && selectedCard.type !== clickedCard.type);
        if (isMatch) {
            lock = true;
            selectedCard.matched = true;
            clickedCard.matched = true;
            matchedCountCurr++;
            playJumpSound();
            selectedCardId = null;
            renderGame();
            lock = false;
        } else {
            selectedCardId = null;
            showMessage(`❌ 配对错误： "${selectedCard.text}" 和 "${clickedCard.text}" 不对应，重新洗牌！`, true);
            resetCurrentLevel();
        }
    }

    function goToLevel(levelIndex) {
        if (levelIndex < 0 || levelIndex >= levelsData.length) return;
        stopTimer();
        currentLevel = levelIndex;
        selectedCardId = null;
        matchedCountCurr = 0;
        currentPairs = buildPairsForLevel(currentLevel);
        lock = false;
        renderGame();
        startTimer();
        showMessage(`✨ 已跳转到第 ${currentLevel+1} 关 ✨`, false);
    }

    function initLevelSelect() {
        levelSelect.innerHTML = '';
        for (let i = 0; i < levelsData.length; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第 ${i+1} 关 (${levelsData[i].words.length}对)`;
            levelSelect.appendChild(option);
        }
        levelSelect.value = 0;
        levelSelect.addEventListener('change', (e) => {
            const newLevel = parseInt(e.target.value);
            if (!isNaN(newLevel) && newLevel !== currentLevel) goToLevel(newLevel);
        });
    }

    function downloadGame() {
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'word_match_game_soul.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showMessage('📥 游戏文件已开始下载！', false);
    }

    resetBtn.addEventListener('click', () => resetCurrentLevel());
    downloadBtn.addEventListener('click', downloadGame);

    document.body.addEventListener('click', () => {
        enableSound();
        if (!audio) { initAudio(); playMusic(); }
        else if (!isPlaying) playMusic();
    }, { once: true });

    initLevelSelect();
    goToLevel(0);
</script>
</body>
</html>
